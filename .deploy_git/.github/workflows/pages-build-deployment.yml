name: Deploy to GitHub Pages
on:
  push:
    branches: [master]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: jekyll/jekyll-gh-deploy-actions/build-and-preview-action@v1.0.9
        with:
          source: ./
          destination_dir: docs

      - id: deployment
        uses: actions/deploy-pages@v4
